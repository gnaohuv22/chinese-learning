<div class="flex">
  <!-- Sidebar (desktop) -->
  <aside class="hidden md:flex flex-col w-64 bg-gray-900 text-white flex-shrink-0 sticky top-16 self-start h-[calc(100vh-64px)] overflow-y-auto">
    <div class="p-4 border-b border-gray-700">
      <p class="text-xs text-gray-400 uppercase tracking-widest">{{ 'admin.title' | translate }}</p>
    </div>

    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-red-700 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors"
        >
          <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="item.icon" />
          </svg>
          {{ item.label | translate }}
        </a>
      }
    </nav>

    <div class="p-4 border-t border-gray-700">
      <a routerLink="/" class="flex items-center gap-2 text-xs text-gray-400 hover:text-white transition-colors">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        {{ 'admin.back_to_site' | translate }}
      </a>
    </div>
  </aside>

  <!-- Mobile sidebar toggle -->
  <div class="md:hidden fixed bottom-4 right-4 z-50">
    <button
      (click)="sidebarOpen.update(v => !v)"
      class="w-12 h-12 bg-red-700 text-white rounded-full shadow-lg flex items-center justify-center"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <!-- Mobile sidebar overlay -->
  @if (sidebarOpen()) {
    <div class="md:hidden fixed inset-0 z-40 flex" (click)="sidebarOpen.set(false)">
      <div class="fixed inset-0 bg-black/50"></div>
      <aside
        class="relative flex flex-col w-64 bg-gray-900 text-white z-50"
        (click)="$event.stopPropagation()"
      >
        <div class="p-4 border-b border-gray-700">
          <p class="text-xs text-gray-400 uppercase tracking-widest">{{ 'admin.title' | translate }}</p>
        </div>
        <nav class="flex-1 p-3 space-y-1">
          @for (item of navItems; track item.route) {
            <a
              [routerLink]="item.route"
              routerLinkActive="bg-red-700 text-white"
              (click)="sidebarOpen.set(false)"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors"
            >
              <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="item.icon" />
              </svg>
              {{ item.label | translate }}
            </a>
          }
        </nav>
      </aside>
    </div>
  }

  <!-- Main content -->
  <main class="flex-1 min-h-[calc(100vh-64px)]" style="background: var(--color-bg)">
    <router-outlet />
  </main>
</div>
