<div class="calc(min-h-screen-64px)" style="background: var(--color-bg);">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-6">
      <h1 class="text-2xl sm:text-3xl font-bold" style="color: var(--color-text);">
        {{ 'radicals.title' | translate }}
      </h1>
      <p class="text-sm mt-2" style="color: var(--color-text-muted);">
        {{ 'radicals.subtitle' | translate }}
      </p>
    </div>

    @if (loading()) {
      <div class="flex justify-center py-12">
        <div class="animate-spin rounded-full h-8 w-8 border-2 border-t-transparent spinner"></div>
      </div>
    } @else if (hasError()) {
      <div class="card text-center py-12 text-sm empty-state">
        {{ 'common.error' | translate }}
      </div>
    } @else if (topics().length === 0) {
      <div class="card text-center py-12 text-sm empty-state">
        {{ 'radicals.empty' | translate }}
      </div>
    } @else {
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        @for (topic of topics(); track topic.id) {
          <button
            type="button"
            class="card text-left border transition-all duration-200 hover:-translate-y-0.5"
            style="border-color: var(--color-border);"
            (click)="openTopic(topic.id)"
          >
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <h2 class="font-semibold text-base sm:text-lg" style="color: var(--color-text);">{{ topic.title }}</h2>
                @if (topic.description) {
                  <p class="text-sm mt-1 line-clamp-2" style="color: var(--color-text-muted);">{{ topic.description }}</p>
                }
              </div>
              <span class="chip chip-gray text-xs whitespace-nowrap">{{ topic.characters.length }} {{ 'radicals.characters' | translate }}</span>
        
            </div>
            <div class="mt-4 flex items-center justify-between">
              <span class="text-xs" style="color: var(--color-text-muted);">
                @if (topic.videoUrl) {
                  {{ 'radicals.has_video' | translate }}
                } @else {
                  {{ 'radicals.no_video' | translate }}
                }
              </span>
              <span class="text-sm font-semibold" style="color: var(--color-primary);">
                {{ 'radicals.start' | translate }} <i class="fa-solid fa-chevron-right text-xs"></i>
              </span>
            </div>
          </button>
        }
      </div>
    }
  </div>
</div>
