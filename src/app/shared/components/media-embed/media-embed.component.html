@if (fileId) {
  <div class="media-embed">
    @switch (mediaType) {
      @case ('video') {
        <div class="relative w-full" style="padding-top: 56.25%">
          <iframe
            [src]="embedUrl"
            class="absolute inset-0 w-full h-full rounded-lg border-0"
            allow="autoplay"
            allowfullscreen
          ></iframe>
        </div>
        <a
          [href]="directUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-1 mt-1 text-xs text-blue-600 hover:underline"
        >
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
          </svg>
          Mở trong tab mới
        </a>
      }
      @case ('audio') {
        <audio controls [src]="directUrl" class="w-full mt-2"></audio>
      }
      @case ('image') {
        <img [src]="thumbnailUrl" [alt]="fileId" class="max-w-full rounded-lg" />
      }
    }
  </div>
}
