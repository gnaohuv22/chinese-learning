@if (!isAdminRoute()) {
<div class="md:hidden">
  <!-- Ôn tập slide-up sheet -->
  @if (ontapSheetOpen()) {
  <div class="fixed inset-0 z-40" style="background: rgba(0,0,0,0.4);" (click)="closeSheet()"></div>
  <div class="fixed z-50 rounded-2xl overflow-hidden shadow-2xl border animate-slide-up" style="
        bottom: calc(max(0.5rem, env(safe-area-inset-bottom)) + 4.5rem);
        left: 50%;
        transform: translateX(-50%);
        width: min(95vw, 520px);
        background: var(--color-bg-surface);
        border-color: var(--color-border);
      ">
    <div class="px-4 py-3 border-b" style="border-color: var(--color-border);">
      <p class="text-xs font-semibold tracking-wider uppercase" style="color: var(--color-primary);">
        {{ 'nav.courses' | translate }}
      </p>
    </div>
    @for (n of [1, 2, 3, 4]; track n) {
    <button type="button" (click)="navigate(['/on-tap', n])"
      class="w-full flex items-center gap-3 px-4 py-3.5 text-sm font-medium border-b last:border-b-0 transition-colors active:opacity-80 text-left"
      style="color: var(--color-text); border-color: var(--color-border);">
      <span class="w-7 h-7 rounded-lg flex items-center justify-center text-sm font-bold flex-shrink-0"
        style="background: var(--color-border); color: var(--color-primary);">{{ n }}</span>
      {{ 'hoc_phan.' + n | translate }}
    </button>
    }
  </div>
  }

  <!-- Floating pill nav bar -->
  <nav class="fixed z-40 rounded-3xl shadow-xl border" style="
      bottom: 0.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(95vw, 520px);
      background: color-mix(in srgb, var(--color-bg) 20%, transparent);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-color: var(--color-border);
      margin-bottom: calc(max(0.5rem, env(safe-area-inset-bottom)) + 0.6rem);
    ">
    <!-- Inner button row — rounded-full active pill is contained here -->
    <div class="flex items-center" style="padding: 0.375rem; gap: 0.125rem;">

      <!-- Home -->
      <button type="button" (click)="navigate('/')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-2xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url === '/'"
        [style.color]="router.url === '/' ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-house text-sm"></i>
        <span>{{ 'nav.home' | translate }}</span>
      </button>

      <!-- Tin tức -->
      <button type="button" (click)="navigate('/news')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-2xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url.startsWith('/news')"
        [style.color]="router.url.startsWith('/news') ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-newspaper text-sm"></i>
        <span>{{ 'nav.news' | translate }}</span>
      </button>

      <!-- Ôn tập (triggers sheet) -->
      <button type="button" (click)="toggleOntapSheet($event)"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-2xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="ontapSheetOpen() || router.url.startsWith('/on-tap')"
        [style.color]="ontapSheetOpen() || router.url.startsWith('/on-tap') ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-book-open text-sm"></i>
        <span>{{ 'nav.courses' | translate }}</span>
      </button>

      <!-- Thi thử -->
      <button type="button" (click)="navigate('/thi-thu')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-2xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url.startsWith('/thi-thu')"
        [style.color]="router.url.startsWith('/thi-thu') ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-file-pen text-sm"></i>
        <span>{{ 'nav.mock_test' | translate }}</span>
      </button>

      <!-- Video -->
      <button type="button" (click)="navigate('/video')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-2xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url.startsWith('/video')"
        [style.color]="router.url.startsWith('/video') ? 'var(--color-primary)' : 'var(--color-text-muted)'"
        id="bottom-nav-video">
        <i class="fa-solid fa-film text-sm"></i>
        <span>Video</span>
      </button>

    </div>
  </nav>
</div>
}
