@if (!isAdminRoute()) {
  <!-- Ôn tập slide-up sheet -->
  @if (ontapSheetOpen()) {
    <div
      class="fixed inset-0 z-40"
      style="background: rgba(0,0,0,0.4);"
      (click)="closeSheet()"
    ></div>
    <div
      class="fixed z-50 rounded-2xl overflow-hidden shadow-2xl border animate-slide-up"
      style="
        bottom: 5.5rem;
        left: 50%;
        transform: translateX(-50%);
        width: min(80vw, 360px);
        background: #3a1b00;
        border-color: #7e480a;
      "
    >
      <div class="px-4 py-3 border-b" style="border-color: #7e480a;">
        <p class="text-xs font-semibold tracking-wider uppercase" style="color: #c8ac89;">
          {{ 'nav.courses' | translate }}
        </p>
      </div>
      @for (n of [1, 2, 3, 4]; track n) {
        <button
          type="button"
          (click)="navigate(['/on-tap', n])"
          class="w-full flex items-center gap-3 px-4 py-3.5 text-sm font-medium border-b last:border-b-0 transition-colors active:opacity-80 text-left"
          style="color: #efe7db; border-color: #7e480a;"
        >
          <span
            class="w-7 h-7 rounded-lg flex items-center justify-center text-sm font-bold flex-shrink-0"
            style="background: #7e480a; color: #efe7db;"
          >{{ n }}</span>
          {{ 'hoc_phan.' + n | translate }}
        </button>
      }
    </div>
  }

  <!-- Floating pill nav bar -->
  <nav
    class="fixed z-40 flex items-center rounded-full shadow-2xl border"
    style="
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(80vw, 360px);
      background: rgba(58, 27, 0, 0.88);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      border-color: rgba(200, 172, 137, 0.3);
      padding: 0.375rem;
      gap: 0.125rem;
    "
  >
    <!-- Home -->
    <button
      type="button"
      (click)="navigate('/')"
      class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-full flex-1 py-2 text-xs font-medium transition-all"
      [class.bottom-nav-active]="router.url === '/'"
      [style.color]="router.url === '/' ? '#c8ac89' : 'rgba(239,231,219,0.7)'"
    >
      <i class="fa-solid fa-house text-sm"></i>
      <span>{{ 'nav.home' | translate }}</span>
    </button>

    <!-- Tin tức -->
    <button
      type="button"
      (click)="navigate('/news')"
      class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-full flex-1 py-2 text-xs font-medium transition-all"
      [class.bottom-nav-active]="router.url.startsWith('/news')"
      [style.color]="router.url.startsWith('/news') ? '#c8ac89' : 'rgba(239,231,219,0.7)'"
    >
      <i class="fa-solid fa-newspaper text-sm"></i>
      <span>{{ 'nav.news' | translate }}</span>
    </button>

    <!-- Ôn tập (triggers sheet) -->
    <button
      type="button"
      (click)="toggleOntapSheet($event)"
      class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-full flex-1 py-2 text-xs font-medium transition-all"
      [class.bottom-nav-active]="ontapSheetOpen() || router.url.startsWith('/on-tap')"
      [style.color]="ontapSheetOpen() || router.url.startsWith('/on-tap') ? '#c8ac89' : 'rgba(239,231,219,0.7)'"
    >
      <i class="fa-solid fa-book-open text-sm"></i>
      <span>{{ 'nav.courses' | translate }}</span>
    </button>

    <!-- Thi thử -->
    <button
      type="button"
      (click)="navigate('/thi-thu')"
      class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-full flex-1 py-2 text-xs font-medium transition-all"
      [class.bottom-nav-active]="router.url.startsWith('/thi-thu')"
      [style.color]="router.url.startsWith('/thi-thu') ? '#c8ac89' : 'rgba(239,231,219,0.7)'"
    >
      <i class="fa-solid fa-file-pen text-sm"></i>
      <span>{{ 'nav.mock_test' | translate }}</span>
    </button>
  </nav>
}
