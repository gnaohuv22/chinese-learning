@if (!isAdminRoute()) {
<div class="md:hidden">
  <!-- Floating pill nav bar -->
  <nav class="fixed z-40 rounded-4xl shadow-xl border" style="
      bottom: 0.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(95vw, 520px);
      background: color-mix(in srgb, var(--color-bg) 20%, transparent);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-color: var(--color-border);
      margin-bottom: max(0.5rem, env(safe-area-inset-bottom));
    ">
    <!-- Inner button row — rounded-full active pill is contained here -->
    <div class="flex items-center" style="padding: 0.375rem; gap: 0.125rem;">

      <!-- Home -->
      <button type="button" (click)="navigate('/')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-3xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url === '/'"
        [style.color]="router.url === '/' ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-house text-sm"></i>
        <span>{{ 'nav.home' | translate }}</span>
      </button>

      <!-- Tin tức -->
      <button type="button" (click)="navigate('/news')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-3xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url.startsWith('/news')"
        [style.color]="router.url.startsWith('/news') ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-newspaper text-sm"></i>
        <span>{{ 'nav.news' | translate }}</span>
      </button>

      <!-- Ôn tập -->
      <button type="button" (click)="navigate('/on-tap/1')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-3xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url.startsWith('/on-tap')"
        [style.color]="router.url.startsWith('/on-tap') ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-book-open text-sm"></i>
        <span>{{ 'nav.courses' | translate }}</span>
      </button>

      <!-- Thi thử -->
      <button type="button" (click)="navigate('/thi-thu')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-3xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url.startsWith('/thi-thu')"
        [style.color]="router.url.startsWith('/thi-thu') ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-file-pen text-sm"></i>
        <span>{{ 'nav.mock_test' | translate }}</span>
      </button>

      <!-- Video -->
      <button type="button" (click)="navigate('/video')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-3xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url.startsWith('/video')"
        [style.color]="router.url.startsWith('/video') ? 'var(--color-primary)' : 'var(--color-text-muted)'"
        id="bottom-nav-video">
        <i class="fa-solid fa-film text-sm"></i>
        <span>Video</span>
      </button>

      <!-- Bộ thủ -->
      <button type="button" (click)="navigate('/bo-thu')"
        class="bottom-nav-btn flex flex-col items-center justify-center gap-0.5 rounded-3xl flex-1 py-2 text-xs font-medium transition-all"
        [class.bottom-nav-active]="router.url.startsWith('/bo-thu')"
        [style.color]="router.url.startsWith('/bo-thu') ? 'var(--color-primary)' : 'var(--color-text-muted)'">
        <i class="fa-solid fa-pen-nib text-sm"></i>
        <span>{{ 'nav.radicals' | translate }}</span>
      </button>

    </div>
  </nav>
</div>
}
