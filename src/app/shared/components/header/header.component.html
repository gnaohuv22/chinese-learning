<header class="sticky top-0 z-50 bg-red-700/95 text-white shadow-md backdrop-blur-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2 font-bold text-xl tracking-tight">
        <span class="text-2xl">漢</span>
        <span class="hidden sm:inline">{{ 'app.title' | translate }}</span>
      </a>

      <!-- Desktop nav -->
      <nav class="hidden md:flex items-center gap-1">
        <a
          routerLink="/"
          routerLinkActive="bg-white/20"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10 transition-colors"
        >
          {{ 'nav.home' | translate }}
        </a>
        <a
          routerLink="/courses"
          routerLinkActive="bg-white/20"
          class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10 transition-colors"
        >
          {{ 'nav.courses' | translate }}
        </a>
        <a
          routerLink="/news"
          routerLinkActive="bg-white/20"
          class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10 transition-colors"
        >
          {{ 'nav.news' | translate }}
        </a>
      </nav>

      <!-- Right side -->
      <div class="flex items-center gap-2">
        <!-- Dark mode toggle -->
        <button
          (click)="theme.toggle()"
          class="p-2 rounded-md hover:bg-white/10 transition-colors"
          [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (theme.isDark()) {
            <i class="fa-solid fa-sun text-sm"></i>
          } @else {
            <i class="fa-solid fa-moon text-sm"></i>
          }
        </button>

        <app-language-switcher />

        <!-- Mobile menu button -->
        <button
          class="md:hidden p-2 rounded-md hover:bg-white/10"
          (click)="mobileMenuOpen.update(v => !v)"
          aria-label="Toggle menu"
        >
          @if (mobileMenuOpen()) {
            <i class="fa-solid fa-xmark w-5 text-center"></i>
          } @else {
            <i class="fa-solid fa-bars w-5 text-center"></i>
          }
        </button>
      </div>
    </div>

    <!-- Mobile nav -->
    @if (mobileMenuOpen()) {
      <nav class="md:hidden pb-3 space-y-1">
        <a
          routerLink="/"
          routerLinkActive="bg-white/20"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="mobileMenuOpen.set(false)"
          class="block px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10"
        >
          {{ 'nav.home' | translate }}
        </a>
        <a
          routerLink="/courses"
          routerLinkActive="bg-white/20"
          (click)="mobileMenuOpen.set(false)"
          class="block px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10"
        >
          {{ 'nav.courses' | translate }}
        </a>
        <a
          routerLink="/news"
          routerLinkActive="bg-white/20"
          (click)="mobileMenuOpen.set(false)"
          class="block px-3 py-2 rounded-md text-sm font-medium hover:bg-white/10"
        >
          {{ 'nav.news' | translate }}
        </a>
      </nav>
    }
  </div>
</header>
