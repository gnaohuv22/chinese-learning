<div class="exercise-dictation space-y-4">
  <p class="text-base font-medium" style="color: var(--color-text)">{{ exercise.prompt }}</p>

  @if (exercise.mediaUrl && exercise.mediaType) {
    <app-media-embed [fileId]="exercise.mediaUrl" [mediaType]="exercise.mediaType" />
  }

  <div class="space-y-2">
    <label class="block text-sm font-medium" style="color: var(--color-text-muted)">{{ 'exercise.dictation_input_label' | translate }}</label>
    <input
      type="text"
      class="form-input w-full max-w-md"
      [disabled]="checked()"
      [ngModel]="userInput()"
      (ngModelChange)="userInput.set($event)"
      [placeholder]="'exercise.dictation_placeholder' | translate"
    />
  </div>

  @if (!checked()) {
    <button type="button" class="btn-primary" [disabled]="!userInput().trim()" (click)="check()">
      {{ 'exercise.check' | translate }}
    </button>
  } @else {
    <div
      class="flex items-start gap-2 p-3 rounded-lg text-sm"
      [class.bg-green-50]="isCorrect()"
      [class.bg-red-50]="!isCorrect()"
    >
      @if (isCorrect()) {
        <svg class="w-5 h-5 text-green-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span class="text-green-700 font-medium">{{ 'exercise.correct' | translate }}</span>
      } @else {
        <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
        <span class="text-red-700">
          {{ 'exercise.incorrect' | translate }}
          <strong class="font-medium">{{ expectedAnswer() }}</strong>
        </span>
      }
    </div>
  }
</div>
