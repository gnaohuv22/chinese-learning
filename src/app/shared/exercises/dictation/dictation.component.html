<div class="exercise-dictation space-y-4">
  <p class="text-base font-medium" style="color: var(--color-text)">{{ exercise.prompt }}</p>

  @if (exercise.mediaUrl && exercise.mediaType) {
    <app-media-embed [fileId]="exercise.mediaUrl" [mediaType]="exercise.mediaType" />
  }

  <div class="space-y-2">
    <label class="block text-sm font-medium" style="color: var(--color-text-muted)">{{ 'exercise.dictation_input_label' | translate }}</label>
    <input
      type="text"
      class="form-input w-full max-w-md"
      [disabled]="checked()"
      [ngModel]="userInput()"
      (ngModelChange)="userInput.set($event)"
      [placeholder]="'exercise.dictation_placeholder' | translate"
    />
  </div>

  @if (!checked()) {
    <button type="button" class="btn-primary" [disabled]="!userInput().trim()" (click)="check()">
      {{ 'exercise.check' | translate }}
    </button>
  } @else {
    <div
      class="flex items-start gap-2 p-3 rounded-lg text-sm border"
      [style.background]="isCorrect() ? 'rgba(22,163,74,0.1)' : 'rgba(220,38,38,0.1)'"
      [style.border-color]="isCorrect() ? '#16a34a' : '#dc2626'"
    >
      @if (isCorrect()) {
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" style="color: #16a34a;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span class="font-semibold" style="color: #15803d;">{{ 'exercise.correct' | translate }}</span>
      } @else {
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" style="color: #dc2626;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
        <span style="color: #dc2626;">
          {{ 'exercise.incorrect' | translate }}
          <strong class="font-medium">{{ expectedAnswer() }}</strong>
        </span>
      }
    </div>
  }
</div>
